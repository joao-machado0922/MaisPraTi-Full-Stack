<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind</title>
</head>

<body>
    <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Clique Aqui</button>

    <div class="bg-red-100 text-red-700 px-4 py-2 rounded-full">Algo deu errado!</div>

    <input type="text" class="border border-gray-300 rounded px-3 py-2" placeholder="Digite aqui">

    <div class="bg-green-500 rounded shadow p-4">
        <h5 class="font-semibold mb-1">Título</h5>
        <p class="text-gray-300 text-sm">Oi meu chapa</p>
    </div>

    <div class="grid grid-cols-4 gap-4 center">
        <div class="bg-red-100">Coluna 1</div>
        <div class="bg-red-200">Coluna 1</div>
        <div class="bg-red-300">Coluna 1</div>
        <div class="bg-red-400">Coluna 1</div>
        <div class="bg-red-500">Coluna 1</div>
        <div class="bg-red-600">Coluna 1</div>
        <div class="bg-red-700">Coluna 1</div>
        <div class="bg-red-800">Coluna 1</div>
        <div class="bg-red-900 col-start-2">Coluna 1</div>
        <div class="bg-blue-900">Coluna 1</div>
    </div>

    <div class="flex flex-wrap justify-center gap-4">
        <div class="bg-red-100">Coluna 1</div>
        <div class="bg-red-200">Coluna 1</div>
        <div class="bg-red-300">Coluna 1</div>
        <div class="bg-red-400">Coluna 1</div>
        <div class="bg-red-500">Coluna 1</div>
        <div class="bg-red-600">Coluna 1</div>
        <div class="bg-red-700">Coluna 1</div>
        <div class="bg-red-800">Coluna 1</div>
        <div class="bg-red-900 col-start-2">Coluna 1</div>
        <div class="bg-blue-900">Coluna 1</div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</html>
