<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clarim Diário</title>
    <link rel="stylesheet" href="../../css/main.css">
    <script src="../components/site-header.js"></script>
    <script src="../components/site-footer.js"></script>
    <script type="module" src="../pages/login.js"></script>
</head>

<body>
    <site-header></site-header>
    <main class="auth">
        <form id="form-login" class="formulario">
            <h1>Entrar</h1>
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" required>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" required>

            <p class="aviso" id="aviso"></p>

            <button type="submit" class="btn btn--primary">Entrar</button>

            <p class="rodape-form">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </main>
    <site-footer></site-footer>
</body>

</html>
